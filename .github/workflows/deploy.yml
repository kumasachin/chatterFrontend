name: CI / Deploy Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Quality checks ────────────────────────────────────────────────────────
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          CI: true
          HUSKY: 0

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit:run
        env:
          # Point at the production backend so no stub server is needed
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL || 'http://localhost:5001' }}

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL || 'http://localhost:5001' }}

  # ── Deploy to Render ──────────────────────────────────────────────────────
  # Only runs on pushes to main (not on pull requests)
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"
